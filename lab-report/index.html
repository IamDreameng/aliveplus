<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Report Lookup | Alive+</title>
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/f0/6e/c7/f06ec79c9969921e80b8b1fd05b2e591.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', Arial, sans-serif; }
    </style>
</head>
<body class="antialiased bg-white text-slate-900 min-h-screen flex flex-col">

    <nav class="w-full p-6 border-b border-slate-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="https://aliveplus.bio" class="text-2xl font-bold tracking-tighter hover:text-emerald-600 transition-colors">Alive+</a>
            <a href="https://aliveplus.bio" class="text-sm font-medium text-slate-500 hover:text-emerald-600 transition-colors">← Back to site</a>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-6 py-20">
        <div class="max-w-lg w-full text-center">
            <p class="text-emerald-600 font-medium tracking-widest uppercase text-xs mb-4">Transparency, verified</p>
            <h1 class="text-4xl font-bold mb-4">Find your Certificate of Analysis</h1>
            <p class="text-slate-600 text-lg mb-10">
                Enter the batch code printed on your product label to view its lab report.
            </p>

            <form id="lookup-form" class="flex flex-col sm:flex-row gap-3 mb-6">
                <input
                    id="code-input"
                    type="text"
                    placeholder="e.g. ALV-2026-001"
                    autocomplete="off"
                    class="flex-1 px-5 py-4 rounded-full border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-center sm:text-left"
                >
                <button
                    type="submit"
                    class="bg-slate-900 text-white px-8 py-4 rounded-full font-semibold hover:bg-slate-700 transition-colors"
                >
                    Find report
                </button>
            </form>

            <div id="result-area" class="min-h-[3rem]"></div>

            <p class="text-slate-400 text-sm mt-10">
                Can't find your batch code? <a href="https://t.me/aliveplus_bio" target="_blank" rel="noopener noreferrer" class="text-emerald-600 hover:underline">Message us on Telegram</a> and we'll send it directly.
            </p>
        </div>
    </main>

    <footer class="py-10 px-6 text-center text-slate-400 text-sm">
        &copy; 2026 Alive+. All rights reserved.
    </footer>

    <script>
        // Map each batch code to its hosted PDF. Add one line per product/batch.
        // Replace these placeholder URLs with the real PDF links once your
        // certificates are uploaded (your own server, or a public Drive/Dropbox link).
        const LAB_REPORTS = {
            '2204202601': 'https://aliveplus.bio/lab-report/bpc157-2204202601.pdf',
            '0205202603': 'https://aliveplus.bio/lab-report/BPC157_TB500_0205202603.pdf',
            '2005202601': 'https://aliveplus.bio/lab-report/MOTSc_2005202601.pdf',
        };

        const form = document.getElementById('lookup-form');
        const input = document.getElementById('code-input');
        const resultArea = document.getElementById('result-area');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const code = input.value.trim().toUpperCase();

            if (!code) {
                resultArea.innerHTML = `<p class="text-red-500 font-medium">Please enter a batch code.</p>`;
                return;
            }

            const pdfUrl = LAB_REPORTS[code];

            if (pdfUrl) {
                resultArea.innerHTML = `
                    <a href="${pdfUrl}" target="_blank" rel="noopener noreferrer"
                       class="inline-flex items-center gap-2 bg-emerald-500 text-white px-6 py-3 rounded-full font-semibold hover:bg-emerald-600 transition-colors">
                        View Certificate (PDF) →
                    </a>
                `;
            } else {
                resultArea.innerHTML = `
                    <p class="text-red-500 font-medium">No report found for "${code}". Double check the code on your label, or contact us below.</p>
                `;
            }
        });
    </script>
</body>
</html>
